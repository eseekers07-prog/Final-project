<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pet Care Management System | Vaccinations</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="./assets/css/theme.css" />
  <style>.sidebar-collapsed aside{width:5.5rem}.sidebar-collapsed .brand-copy,.sidebar-collapsed nav span,.sidebar-collapsed #userBadge{display:none}</style>
</head>
<body class="bg-slate-100 text-slate-950 antialiased">
  <div id="appLayout" class="flex min-h-screen">
    <aside class="w-72 shrink-0 bg-slate-950 p-5 text-white transition-all duration-300">
      <div class="mb-8 flex items-center gap-3"><div class="flex h-11 w-11 items-center justify-center rounded-lg bg-teal-300 text-slate-950"><i data-lucide="stethoscope" class="h-6 w-6"></i></div><div class="brand-copy"><p class="text-xs uppercase tracking-[0.28em] text-teal-200">Pet Care</p><h1 class="text-lg font-semibold">Management System</h1></div></div>
      <nav id="sidebarNav" class="space-y-2"></nav>
      <div class="mt-8 rounded-lg border border-white/10 bg-white/10 p-4" id="userBadge"></div>
    </aside>
    <main class="flex-1 overflow-hidden">
      <header class="flex flex-wrap items-center justify-between gap-3 border-b border-slate-200 bg-white px-6 py-4">
        <div class="flex items-center gap-3"><button id="sidebarToggle" class="rounded-lg border border-slate-200 p-2 transition-all duration-300 hover:bg-slate-100" aria-label="Toggle sidebar"><i data-lucide="panel-left-close" class="h-5 w-5"></i></button><div><p class="text-sm font-semibold uppercase tracking-[0.22em] text-indigo-700">Preventive Care</p><h2 class="text-2xl font-semibold">Vaccinations</h2></div></div>
        <div class="flex items-center gap-3"><button id="openVaccinationModal" class="flex items-center gap-2 rounded-lg bg-indigo-700 px-4 py-2 text-sm font-semibold text-white transition-all duration-300 hover:bg-slate-950"><i data-lucide="syringe" class="h-4 w-4"></i> Add Record</button><button id="logoutBtn" class="rounded-lg bg-slate-950 px-4 py-2 text-sm font-semibold text-white transition-all duration-300 hover:bg-indigo-900">Logout</button></div>
      </header>

      <section class="space-y-6 p-6">
        <div class="grid gap-4 md:grid-cols-4">
          <article class="rounded-lg border border-slate-200 bg-white p-5 shadow-sm"><p class="text-sm font-semibold text-slate-500">Total Records</p><div id="vacc-stat-total" class="mt-3 text-4xl font-semibold text-slate-950">0</div></article>
          <article class="rounded-lg border border-slate-200 bg-white p-5 shadow-sm"><p class="text-sm font-semibold text-slate-500">Overdue</p><div id="vacc-stat-overdue" class="mt-3 text-4xl font-semibold text-rose-700">0</div></article>
          <article class="rounded-lg border border-slate-200 bg-white p-5 shadow-sm"><p class="text-sm font-semibold text-slate-500">Due Soon</p><div id="vacc-stat-due-soon" class="mt-3 text-4xl font-semibold text-amber-700">0</div></article>
          <article class="rounded-lg border border-slate-200 bg-white p-5 shadow-sm"><p class="text-sm font-semibold text-slate-500">Current</p><div id="vacc-stat-current" class="mt-3 text-4xl font-semibold text-teal-700">0</div></article>
        </div>

        <section class="rounded-lg border border-slate-200 bg-white p-4 shadow-sm">
          <div class="grid gap-3 lg:grid-cols-[1fr_220px_220px]">
            <label class="relative block"><i data-lucide="search" class="pointer-events-none absolute left-3 top-1/2 h-4 w-4 -translate-y-1/2 text-slate-400"></i><input id="vaccinationSearch" class="w-full rounded-lg border border-slate-200 py-3 pl-10 pr-4 text-sm outline-none transition-all duration-300 focus:border-indigo-500" placeholder="Search vaccine, pet, product, or vet" /></label>
            <select id="vaccinationPetFilter" class="rounded-lg border border-slate-200 px-4 py-3 text-sm outline-none focus:border-indigo-500"><option value="">Loading pets...</option></select>
            <select id="vaccinationStatusFilter" class="rounded-lg border border-slate-200 px-4 py-3 text-sm outline-none focus:border-indigo-500"><option value="all">All status</option><option value="overdue">Overdue</option><option value="due_soon">Due soon</option><option value="current">Current</option></select>
          </div>
        </section>

        <div class="rounded-lg border border-slate-200 bg-white shadow-sm">
          <div class="border-b border-slate-200 px-5 py-4"><h3 class="text-lg font-semibold">Vaccination History</h3></div>
          <div class="overflow-x-auto">
            <table id="vaccinations-table" class="w-full min-w-[980px] text-left text-sm">
              <thead class="bg-slate-50 text-xs uppercase tracking-[0.16em] text-slate-500"><tr><th class="px-4 py-3">Pet</th><th class="px-4 py-3">Vaccine</th><th class="px-4 py-3">Product</th><th class="px-4 py-3">Date</th><th class="px-4 py-3">Next Due</th><th class="px-4 py-3">Status</th><th class="px-4 py-3">Vet</th><th class="px-4 py-3">Reaction</th></tr></thead>
              <tbody><tr><td colspan="8" class="px-4 py-8 text-center text-slate-500">Loading vaccination records...</td></tr></tbody>
            </table>
          </div>
        </div>
      </section>
    </main>
  </div>

  <dialog id="addVaccinationModal" class="w-full max-w-2xl rounded-lg p-0 backdrop:bg-slate-950/60">
    <form id="addVaccinationForm" method="dialog" class="space-y-4 bg-white p-6 text-slate-950">
      <div class="flex items-center justify-between"><h3 class="text-xl font-semibold">Add Vaccination Record</h3><button type="button" onclick="document.getElementById('addVaccinationModal').close()" class="rounded-lg border border-slate-200 p-2"><i data-lucide="x" class="h-5 w-5"></i></button></div>
      <div class="grid gap-4 sm:grid-cols-2">
        <label class="block"><span class="mb-1 block text-sm font-semibold text-slate-600">Pet</span><select name="pet_id" required class="w-full rounded-lg border border-slate-200 px-4 py-3 outline-none focus:border-indigo-500"><option value="">Loading pets...</option></select></label>
        <label class="block"><span class="mb-1 block text-sm font-semibold text-slate-600">Veterinarian</span><select name="adminstered_vet_id" required class="w-full rounded-lg border border-slate-200 px-4 py-3 outline-none focus:border-indigo-500"><option value="">Loading veterinarians...</option></select></label>
        <label class="block sm:col-span-2"><span class="mb-1 block text-sm font-semibold text-slate-600">Vaccine Name</span><input name="vaccine_name" required class="w-full rounded-lg border border-slate-200 px-4 py-3 outline-none focus:border-indigo-500" /></label>
        <label class="block sm:col-span-2"><span class="mb-1 block text-sm font-semibold text-slate-600">Product</span><select name="product_id" class="w-full rounded-lg border border-slate-200 px-4 py-3 outline-none focus:border-indigo-500"><option value="">Loading products...</option></select></label>
        <label class="block"><span class="mb-1 block text-sm font-semibold text-slate-600">Date</span><input name="date" type="date" required class="w-full rounded-lg border border-slate-200 px-4 py-3 outline-none focus:border-indigo-500" /></label>
        <label class="block"><span class="mb-1 block text-sm font-semibold text-slate-600">Next Due Date</span><input name="next_due_date" type="date" class="w-full rounded-lg border border-slate-200 px-4 py-3 outline-none focus:border-indigo-500" /></label>
        <label class="block"><span class="mb-1 block text-sm font-semibold text-slate-600">Batch Number</span><input name="batch_number" class="w-full rounded-lg border border-slate-200 px-4 py-3 outline-none focus:border-indigo-500" /></label>
        <label class="block"><span class="mb-1 block text-sm font-semibold text-slate-600">Reaction Noted</span><input name="reaction_noted" class="w-full rounded-lg border border-slate-200 px-4 py-3 outline-none focus:border-indigo-500" /></label>
        <label class="block sm:col-span-2"><span class="mb-1 block text-sm font-semibold text-slate-600">Notes</span><textarea name="notes" rows="3" class="w-full resize-none rounded-lg border border-slate-200 px-4 py-3 outline-none focus:border-indigo-500"></textarea></label>
      </div>
      <button type="submit" class="w-full rounded-lg bg-slate-950 px-5 py-3 font-bold text-white transition-all duration-300 hover:bg-indigo-800">Save Vaccination</button>
    </form>
  </dialog>

  <div id="notice" class="hidden"></div>
  <script type="module">import { initVaccinationsPage } from './assets/js/main.js'; document.addEventListener('DOMContentLoaded', initVaccinationsPage);</script>
</body>
</html>
