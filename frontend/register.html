<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pet Care Management System | Pet Owner Registration</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="./assets/css/theme.css" />
  <style>
    .pet-bg {
      background-image: url('https://images.unsplash.com/photo-1630438994394-3deff7a591bf?auto=format&fit=crop&fm=jpg&q=85&w=2400');
      animation: bgDrift 18s ease-in-out infinite alternate;
    }
    .glass-card {
      animation: cardIn 780ms cubic-bezier(.2,.8,.2,1) both;
    }
    .float-paw {
      animation: floatPaw var(--speed, 9s) ease-in-out infinite;
      animation-delay: var(--delay, 0s);
    }
    .soft-glow {
      animation: glowPulse 4.5s ease-in-out infinite;
    }
    @keyframes bgDrift {
      from { transform: scale(1.02) translate3d(-8px, -4px, 0); }
      to { transform: scale(1.08) translate3d(10px, 8px, 0); }
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px) scale(.98); filter: blur(8px); }
      to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
    }
    @keyframes floatPaw {
      0%, 100% { transform: translate3d(0, 0, 0) rotate(-8deg); opacity: .2; }
      50% { transform: translate3d(18px, -28px, 0) rotate(8deg); opacity: .48; }
    }
    @keyframes glowPulse {
      0%, 100% { opacity: .45; transform: scale(1); }
      50% { opacity: .7; transform: scale(1.08); }
    }
  </style>
</head>
<body class="min-h-screen bg-slate-950 text-white antialiased">
  <div class="pet-bg fixed inset-0 bg-cover bg-center"></div>
  <div class="fixed inset-0 bg-gradient-to-br from-slate-950/82 via-slate-950/56 to-indigo-950/72"></div>
  <div class="soft-glow fixed -left-24 top-20 h-80 w-80 rounded-full bg-teal-300/20 blur-3xl"></div>
  <div class="soft-glow fixed bottom-10 right-10 h-96 w-96 rounded-full bg-indigo-400/20 blur-3xl" style="animation-delay: 1.2s"></div>
  <div class="pointer-events-none fixed inset-0 overflow-hidden">
    <i data-lucide="paw-print" class="float-paw absolute left-[8%] top-[18%] h-10 w-10 text-white" style="--speed: 8s"></i>
    <i data-lucide="paw-print" class="float-paw absolute bottom-[18%] left-[18%] h-7 w-7 text-teal-200" style="--speed: 10s; --delay: .8s"></i>
    <i data-lucide="paw-print" class="float-paw absolute right-[12%] top-[22%] h-8 w-8 text-white" style="--speed: 11s; --delay: 1.6s"></i>
    <i data-lucide="bone" class="float-paw absolute bottom-[16%] right-[15%] h-9 w-9 text-teal-200" style="--speed: 9s; --delay: .4s"></i>
  </div>
  <main class="relative flex min-h-screen items-center justify-center px-5 py-10">
    <section class="glass-card w-full max-w-3xl rounded-[1.5rem] border border-white/20 bg-white/15 p-6 shadow-2xl shadow-slate-950/50 backdrop-blur-lg sm:p-9">
      <div class="mb-7 flex items-start justify-between gap-5">
        <div>
          <p class="text-sm font-semibold uppercase tracking-[0.28em] text-teal-200">Pet Owner Access</p>
          <h1 class="mt-3 text-3xl font-semibold tracking-tight">Create your owner profile</h1>
        </div>
        <a href="login.html" class="rounded-lg border border-white/15 px-4 py-2 text-sm font-semibold text-white transition-all duration-300 hover:bg-white hover:text-slate-950">Login</a>
      </div>

      <form id="registerForm" class="grid gap-4 sm:grid-cols-2">
        <label class="block sm:col-span-2">
          <span class="mb-2 block text-sm font-medium text-slate-100">Full Name</span>
          <input name="full_name" required class="w-full rounded-lg border border-white/15 bg-slate-950/35 px-4 py-3 outline-none transition-all duration-300 focus:border-teal-300" />
        </label>
        <label class="block">
          <span class="mb-2 block text-sm font-medium text-slate-100">Username</span>
          <input name="username" required class="w-full rounded-lg border border-white/15 bg-slate-950/35 px-4 py-3 outline-none transition-all duration-300 focus:border-teal-300" />
        </label>
        <label class="block">
          <span class="mb-2 block text-sm font-medium text-slate-100">Email</span>
          <input name="email" type="email" required class="w-full rounded-lg border border-white/15 bg-slate-950/35 px-4 py-3 outline-none transition-all duration-300 focus:border-teal-300" />
        </label>
        <label class="block">
          <span class="mb-2 block text-sm font-medium text-slate-100">Phone Number</span>
          <input name="phone_number" required class="w-full rounded-lg border border-white/15 bg-slate-950/35 px-4 py-3 outline-none transition-all duration-300 focus:border-teal-300" />
        </label>
        <label class="block">
          <span class="mb-2 block text-sm font-medium text-slate-100">Password</span>
          <input name="password" type="password" minlength="8" required class="w-full rounded-lg border border-white/15 bg-slate-950/35 px-4 py-3 outline-none transition-all duration-300 focus:border-teal-300" />
        </label>
        <label class="block sm:col-span-2">
          <span class="mb-2 block text-sm font-medium text-slate-100">Address</span>
          <textarea name="address" required rows="3" class="w-full resize-none rounded-lg border border-white/15 bg-slate-950/35 px-4 py-3 outline-none transition-all duration-300 focus:border-teal-300"></textarea>
        </label>
        <button type="submit" class="sm:col-span-2 flex items-center justify-center gap-2 rounded-lg bg-white px-5 py-3 font-bold text-slate-950 shadow-xl shadow-slate-950/20 transition-all duration-300 hover:-translate-y-0.5 hover:bg-teal-200">
          <i data-lucide="user-plus" class="h-5 w-5"></i>
          Create Pet Owner Account
        </button>
      </form>
    </section>
  </main>
  <div id="notice" class="hidden"></div>

  <script type="module">
    import { handleRegister } from './assets/js/main.js';
    document.getElementById('registerForm').addEventListener('submit', handleRegister);
    window.lucide?.createIcons();
  </script>
</body>
</html>
