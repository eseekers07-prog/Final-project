<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pet Care Management System | Invoices</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="./assets/css/theme.css" />
  <style>.sidebar-collapsed aside{width:5.5rem}.sidebar-collapsed .brand-copy,.sidebar-collapsed nav span,.sidebar-collapsed #userBadge{display:none}</style>
</head>
<body class="bg-slate-100 text-slate-950 antialiased">
  <div id="appLayout" class="flex min-h-screen">
    <aside class="w-72 shrink-0 bg-slate-950 p-5 text-white transition-all duration-300"><div class="mb-8 flex items-center gap-3"><div class="flex h-11 w-11 items-center justify-center rounded-lg bg-teal-300 text-slate-950"><i data-lucide="stethoscope" class="h-6 w-6"></i></div><div class="brand-copy"><p class="text-xs uppercase tracking-[0.28em] text-teal-200">Pet Care</p><h1 class="text-lg font-semibold">Management System</h1></div></div><nav id="sidebarNav" class="space-y-2"></nav><div class="mt-8 rounded-lg border border-white/10 bg-white/10 p-4" id="userBadge"></div></aside>
    <main class="flex-1 overflow-hidden">
      <header class="flex flex-wrap items-center justify-between gap-3 border-b border-slate-200 bg-white px-6 py-4"><div class="flex items-center gap-3"><button id="sidebarToggle" class="rounded-lg border border-slate-200 p-2 transition-all duration-300 hover:bg-slate-100" aria-label="Toggle sidebar"><i data-lucide="panel-left-close" class="h-5 w-5"></i></button><div><p class="text-sm font-semibold uppercase tracking-[0.22em] text-indigo-700">Finance</p><h2 class="text-2xl font-semibold">Invoices</h2></div></div><div class="flex items-center gap-3"><button id="openInvoiceModal" class="flex items-center gap-2 rounded-lg bg-indigo-700 px-4 py-2 text-sm font-semibold text-white transition-all duration-300 hover:bg-slate-950"><i data-lucide="receipt-text" class="h-4 w-4"></i> New Invoice</button><button id="logoutBtn" class="rounded-lg bg-slate-950 px-4 py-2 text-sm font-semibold text-white transition-all duration-300 hover:bg-indigo-900">Logout</button></div></header>
      <section class="p-6"><div class="rounded-lg border border-slate-200 bg-white shadow-sm"><div class="border-b border-slate-200 px-5 py-4"><h3 class="text-lg font-semibold">Billing Ledger</h3></div><div class="overflow-x-auto"><table id="invoices-table" class="w-full min-w-[860px] text-left text-sm"><thead class="bg-slate-50 text-xs uppercase tracking-[0.16em] text-slate-500"><tr><th class="px-4 py-3">Invoice</th><th class="px-4 py-3">Pet</th><th class="px-4 py-3">Appointment</th><th class="px-4 py-3">Amount</th><th class="px-4 py-3">Payment Status</th><th class="px-4 py-3 text-right">Action</th></tr></thead><tbody></tbody></table></div></div></section>
    </main>
  </div>
  <dialog id="addInvoiceModal" class="w-full max-w-xl rounded-lg p-0 backdrop:bg-slate-950/60"><form id="addInvoiceForm" method="dialog" class="space-y-4 bg-white p-6 text-slate-950"><div class="flex items-center justify-between"><h3 class="text-xl font-semibold">Create Invoice</h3><button type="button" onclick="document.getElementById('addInvoiceModal').close()" class="rounded-lg border border-slate-200 p-2"><i data-lucide="x" class="h-5 w-5"></i></button></div><label class="block"><span class="mb-1 block text-sm font-semibold text-slate-600">Appointment ID</span><input name="appointment_id" type="number" required class="w-full rounded-lg border border-slate-200 px-4 py-3 outline-none focus:border-indigo-500" /></label><label class="block"><span class="mb-1 block text-sm font-semibold text-slate-600">Total Amount</span><input name="total_amount" type="number" step="0.01" required class="w-full rounded-lg border border-slate-200 px-4 py-3 outline-none focus:border-indigo-500" /></label><label class="block"><span class="mb-1 block text-sm font-semibold text-slate-600">Payment Status</span><select name="payment_status" class="w-full rounded-lg border border-slate-200 px-4 py-3 outline-none focus:border-indigo-500"><option value="pending">pending</option><option value="paid">paid</option><option value="overdue">overdue</option><option value="refunded">refunded</option></select></label><label class="block"><span class="mb-1 block text-sm font-semibold text-slate-600">Payment Method</span><input name="payment_method" class="w-full rounded-lg border border-slate-200 px-4 py-3 outline-none focus:border-indigo-500" /></label><button type="submit" class="w-full rounded-lg bg-slate-950 px-5 py-3 font-bold text-white transition-all duration-300 hover:bg-indigo-800">Save Invoice</button></form></dialog>
  <dialog id="paymentModal" class="w-full max-w-lg rounded-lg p-0 backdrop:bg-slate-950/60">
    <form id="paymentForm" class="space-y-5 bg-white p-6 text-slate-950">
      <input type="hidden" name="invoice_id" />
      <div class="flex items-start justify-between gap-4">
        <div>
          <p class="text-sm font-semibold uppercase tracking-[0.18em] text-indigo-700">Secure Payment</p>
          <h3 class="mt-1 text-2xl font-semibold">Pay Invoice</h3>
          <p class="mt-1 text-sm text-slate-500">Amount due: <span id="paymentAmount" class="font-bold text-slate-950">LKR 0.00</span></p>
        </div>
        <button id="closePaymentModal" type="button" class="rounded-lg border border-slate-200 p-2 transition-all duration-300 hover:bg-slate-100" aria-label="Close payment"><i data-lucide="x" class="h-5 w-5"></i></button>
      </div>
      <label class="block"><span class="mb-1 block text-sm font-semibold text-slate-600">Payment Method</span><select name="payment_method" required class="w-full rounded-lg border border-slate-200 px-4 py-3 outline-none focus:border-indigo-500"><option value="Online Card">Online Card</option><option value="Bank Transfer">Bank Transfer</option></select></label>
      <label class="block"><span class="mb-1 block text-sm font-semibold text-slate-600">Cardholder Name</span><input name="cardholder_name" required maxlength="120" autocomplete="cc-name" class="w-full rounded-lg border border-slate-200 px-4 py-3 outline-none focus:border-indigo-500" /></label>
      <label class="block"><span class="mb-1 block text-sm font-semibold text-slate-600">Card Number</span><input name="card_number" required inputmode="numeric" minlength="12" maxlength="19" autocomplete="cc-number" placeholder="4242 4242 4242 4242" class="w-full rounded-lg border border-slate-200 px-4 py-3 outline-none focus:border-indigo-500" /></label>
      <div class="grid gap-4 sm:grid-cols-2">
        <label class="block"><span class="mb-1 block text-sm font-semibold text-slate-600">Expiry</span><input name="expiry" required placeholder="MM/YY" maxlength="5" autocomplete="cc-exp" class="w-full rounded-lg border border-slate-200 px-4 py-3 outline-none focus:border-indigo-500" /></label>
        <label class="block"><span class="mb-1 block text-sm font-semibold text-slate-600">CVV</span><input name="cvv" required inputmode="numeric" minlength="3" maxlength="4" autocomplete="cc-csc" class="w-full rounded-lg border border-slate-200 px-4 py-3 outline-none focus:border-indigo-500" /></label>
      </div>
      <button type="submit" class="flex w-full items-center justify-center gap-2 rounded-lg bg-teal-600 px-5 py-3 font-bold text-white transition-all duration-300 hover:bg-slate-950"><i data-lucide="lock-keyhole" class="h-4 w-4"></i> Pay Securely</button>
    </form>
  </dialog>
  <div id="notice" class="hidden"></div>
  <script type="module">import { initInvoicesPage } from './assets/js/main.js'; document.addEventListener('DOMContentLoaded', initInvoicesPage);</script>
</body>
</html>
