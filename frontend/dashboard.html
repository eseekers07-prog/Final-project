<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pet Care Management System | Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="./assets/css/theme.css" />
  <style>
    .sidebar-collapsed aside { width: 5.5rem; }
    .sidebar-collapsed .brand-copy, .sidebar-collapsed nav span, .sidebar-collapsed #userBadge { display: none; }
  </style>
</head>
<body class="bg-slate-100 text-slate-950 antialiased">
  <div id="appLayout" class="flex min-h-screen">
    <aside class="w-72 shrink-0 bg-slate-950 p-5 text-white transition-all duration-300">
      <div class="mb-8 flex items-center gap-3">
        <div class="flex h-11 w-11 items-center justify-center rounded-lg bg-teal-300 text-slate-950"><i data-lucide="stethoscope" class="h-6 w-6"></i></div>
        <div class="brand-copy">
          <p class="text-xs uppercase tracking-[0.28em] text-teal-200">Pet Care</p>
          <h1 class="text-lg font-semibold">Management System</h1>
        </div>
      </div>
      <nav id="sidebarNav" class="space-y-2"></nav>
      <div class="mt-8 rounded-lg border border-white/10 bg-white/10 p-4" id="userBadge"></div>
    </aside>

    <main class="flex-1 overflow-hidden">
      <header class="flex items-center justify-between border-b border-slate-200 bg-white px-6 py-4">
        <div class="flex items-center gap-3">
          <button id="sidebarToggle" class="rounded-lg border border-slate-200 p-2 transition-all duration-300 hover:bg-slate-100" aria-label="Toggle sidebar">
            <i data-lucide="panel-left-close" class="h-5 w-5"></i>
          </button>
          <div>
            <p class="text-sm font-semibold uppercase tracking-[0.22em] text-indigo-700">Operations</p>
            <h2 class="text-2xl font-semibold">Dashboard</h2>
          </div>
        </div>
        <button id="logoutBtn" class="flex items-center gap-2 rounded-lg bg-slate-950 px-4 py-2 text-sm font-semibold text-white transition-all duration-300 hover:bg-indigo-900">
          <i data-lucide="log-out" class="h-4 w-4"></i> Logout
        </button>
      </header>

      <section class="space-y-6 p-6">
        <div class="grid gap-4 md:grid-cols-4">
          <article class="rounded-lg border border-slate-200 bg-white p-5 shadow-sm">
            <p class="text-sm font-semibold text-slate-500">Total Pets</p>
            <div id="stat-pets" class="mt-3 text-4xl font-semibold text-slate-950">0</div>
          </article>
          <article class="rounded-lg border border-slate-200 bg-white p-5 shadow-sm">
            <p class="text-sm font-semibold text-slate-500">Scheduled Appointments</p>
            <div id="stat-appts" class="mt-3 text-4xl font-semibold text-indigo-700">0</div>
          </article>
          <article class="rounded-lg border border-slate-200 bg-white p-5 shadow-sm">
            <p class="text-sm font-semibold text-slate-500">Invoice Value</p>
            <div id="stat-rev" class="mt-3 text-4xl font-semibold text-teal-700">$0.00</div>
          </article>
          <article class="rounded-lg border border-slate-200 bg-white p-5 shadow-sm">
            <p class="text-sm font-semibold text-slate-500">Clinical Capacity</p>
            <div id="stat-vets" class="mt-3 text-4xl font-semibold text-slate-950">0</div>
          </article>
        </div>

        <section class="rounded-lg border border-slate-200 bg-white shadow-sm">
          <div class="flex items-center justify-between border-b border-slate-200 px-5 py-4">
            <h3 class="text-lg font-semibold">Recent Appointment Flow</h3>
            <a href="appointments.html" class="text-sm font-semibold text-indigo-700 transition-all duration-300 hover:text-slate-950">View appointments</a>
          </div>
          <div class="overflow-x-auto">
            <table id="activity-table" class="w-full min-w-[720px] text-left text-sm">
              <thead class="bg-slate-50 text-xs uppercase tracking-[0.16em] text-slate-500">
                <tr>
                  <th class="px-4 py-3">Pet</th>
                  <th class="px-4 py-3">Veterinarian</th>
                  <th class="px-4 py-3">Type</th>
                  <th class="px-4 py-3">Status</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </section>
      </section>
    </main>
  </div>
  <div id="notice" class="hidden"></div>

  <script type="module">
    import { initDashboard } from './assets/js/main.js';
    document.addEventListener('DOMContentLoaded', initDashboard);
  </script>
</body>
</html>
