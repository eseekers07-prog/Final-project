<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pet Care Management System | Admin Setup Disabled</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="./assets/css/theme.css" />
  <style>
    .pet-bg {
      background-image: url('https://images.unsplash.com/photo-1630438994394-3deff7a591bf?auto=format&fit=crop&fm=jpg&q=85&w=2400');
      animation: bgDrift 18s ease-in-out infinite alternate;
    }
    .glass-card { animation: cardIn 780ms cubic-bezier(.2,.8,.2,1) both; }
    @keyframes bgDrift {
      from { transform: scale(1.02) translate3d(-8px, -4px, 0); }
      to { transform: scale(1.08) translate3d(10px, 8px, 0); }
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px) scale(.98); filter: blur(8px); }
      to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
    }
  </style>
</head>
<body class="min-h-screen bg-slate-950 text-white antialiased">
  <div class="pet-bg fixed inset-0 bg-cover bg-center"></div>
  <div class="fixed inset-0 bg-gradient-to-br from-slate-950/84 via-slate-950/60 to-indigo-950/75"></div>

  <main class="relative flex min-h-screen items-center justify-center px-5 py-10">
    <section class="glass-card w-full max-w-xl rounded-[1.5rem] border border-white/20 bg-white/15 p-6 shadow-2xl shadow-slate-950/50 backdrop-blur-lg sm:p-9">
      <div class="mb-7">
        <div class="mb-4 flex h-12 w-12 items-center justify-center rounded-xl bg-teal-300 text-slate-950">
          <i data-lucide="shield-check" class="h-7 w-7"></i>
        </div>
        <p class="text-sm font-semibold uppercase tracking-[0.28em] text-teal-200">Admin Locked</p>
        <h1 class="mt-3 text-3xl font-semibold tracking-tight">Admin registration is disabled</h1>
        <p class="mt-3 text-sm leading-6 text-slate-200">Use the default Admin account created by schema.sql or seed.php.</p>
      </div>

      <div class="rounded-lg border border-white/15 bg-slate-950/35 p-4 text-sm text-slate-100">
        <p><span class="font-semibold text-teal-200">Username:</span> Admin</p>
        <p class="mt-2"><span class="font-semibold text-teal-200">Password:</span> 1234567890</p>
      </div>

      <a href="login.html" class="mt-6 inline-flex text-sm font-semibold text-teal-200 transition-all duration-300 hover:text-white">Back to login</a>
    </section>
  </main>
  <div id="notice" class="hidden"></div>

  <script>
    window.lucide?.createIcons();
  </script>
</body>
</html>
