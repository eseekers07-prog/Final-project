<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pet Care Management System | Appointments</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="./assets/css/theme.css" />
  <style>.sidebar-collapsed aside{width:5.5rem}.sidebar-collapsed .brand-copy,.sidebar-collapsed nav span,.sidebar-collapsed #userBadge{display:none}</style>
</head>
<body class="bg-slate-100 text-slate-950 antialiased">
  <div id="appLayout" class="flex min-h-screen">
    <aside class="w-72 shrink-0 bg-slate-950 p-5 text-white transition-all duration-300"><div class="mb-8 flex items-center gap-3"><div class="flex h-11 w-11 items-center justify-center rounded-lg bg-teal-300 text-slate-950"><i data-lucide="stethoscope" class="h-6 w-6"></i></div><div class="brand-copy"><p class="text-xs uppercase tracking-[0.28em] text-teal-200">Pet Care</p><h1 class="text-lg font-semibold">Management System</h1></div></div><nav id="sidebarNav" class="space-y-2"></nav><div class="mt-8 rounded-lg border border-white/10 bg-white/10 p-4" id="userBadge"></div></aside>
    <main class="flex-1 overflow-hidden">
      <header class="flex items-center justify-between border-b border-slate-200 bg-white px-6 py-4"><div class="flex items-center gap-3"><button id="sidebarToggle" class="rounded-lg border border-slate-200 p-2 transition-all duration-300 hover:bg-slate-100" aria-label="Toggle sidebar"><i data-lucide="panel-left-close" class="h-5 w-5"></i></button><div><p class="text-sm font-semibold uppercase tracking-[0.22em] text-indigo-700">Scheduling</p><h2 class="text-2xl font-semibold">Appointments</h2></div></div><div class="flex items-center gap-3"><button id="openApptModal" class="flex items-center gap-2 rounded-lg bg-indigo-700 px-4 py-2 text-sm font-semibold text-white transition-all duration-300 hover:bg-slate-950"><i data-lucide="calendar-plus" class="h-4 w-4"></i> Book</button><button id="logoutBtn" class="rounded-lg bg-slate-950 px-4 py-2 text-sm font-semibold text-white transition-all duration-300 hover:bg-indigo-900">Logout</button></div></header>
      <section class="p-6"><div class="rounded-lg border border-slate-200 bg-white shadow-sm"><div class="border-b border-slate-200 px-5 py-4"><h3 class="text-lg font-semibold">Clinic Schedule</h3></div><div class="overflow-x-auto"><table id="appointments-table" class="w-full min-w-[860px] text-left text-sm"><thead class="bg-slate-50 text-xs uppercase tracking-[0.16em] text-slate-500"><tr><th class="px-4 py-3">Pet</th><th class="px-4 py-3">Veterinarian</th><th class="px-4 py-3">Scheduled</th><th class="px-4 py-3">Type</th><th class="px-4 py-3">Status</th><th class="px-4 py-3 text-right">Action</th></tr></thead><tbody></tbody></table></div></div></section>
    </main>
  </div>
  <dialog id="addApptModal" class="w-full max-w-xl rounded-lg p-0 backdrop:bg-slate-950/60"><form id="addApptForm" method="dialog" class="space-y-4 bg-white p-6 text-slate-950"><div class="flex items-center justify-between"><h3 class="text-xl font-semibold">Book Appointment</h3><button type="button" onclick="document.getElementById('addApptModal').close()" class="rounded-lg border border-slate-200 p-2"><i data-lucide="x" class="h-5 w-5"></i></button></div><div class="grid gap-4 sm:grid-cols-2"><label class="block"><span class="mb-1 block text-sm font-semibold text-slate-600">Veterinarian</span><select name="vet_id" required class="w-full rounded-lg border border-slate-200 px-4 py-3 outline-none focus:border-indigo-500"><option value="">Loading veterinarians...</option></select></label><label class="block"><span class="mb-1 block text-sm font-semibold text-slate-600">Pet</span><select name="pet_id" required class="w-full rounded-lg border border-slate-200 px-4 py-3 outline-none focus:border-indigo-500"><option value="">Loading pets...</option></select></label><label class="block sm:col-span-2"><span class="mb-1 block text-sm font-semibold text-slate-600">Scheduled Date</span><input name="scheduled_date" type="datetime-local" required class="w-full rounded-lg border border-slate-200 px-4 py-3 outline-none focus:border-indigo-500" /></label><label class="block"><span class="mb-1 block text-sm font-semibold text-slate-600">Type</span><input name="type" required class="w-full rounded-lg border border-slate-200 px-4 py-3 outline-none focus:border-indigo-500" /></label><label class="block"><span class="mb-1 block text-sm font-semibold text-slate-600">Fee</span><input name="fee" type="number" step="0.01" class="w-full rounded-lg border border-slate-200 px-4 py-3 outline-none focus:border-indigo-500" /></label><label class="block sm:col-span-2"><span class="mb-1 block text-sm font-semibold text-slate-600">Reason</span><textarea name="resone" rows="3" class="w-full resize-none rounded-lg border border-slate-200 px-4 py-3 outline-none focus:border-indigo-500"></textarea></label></div><button type="submit" class="w-full rounded-lg bg-slate-950 px-5 py-3 font-bold text-white transition-all duration-300 hover:bg-indigo-800">Save Appointment</button></form></dialog>
  <div id="notice" class="hidden"></div>
  <script type="module">import { initAppointmentsPage } from './assets/js/main.js'; document.addEventListener('DOMContentLoaded', initAppointmentsPage);</script>
</body>
</html>
