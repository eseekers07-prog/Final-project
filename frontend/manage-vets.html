<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pet Care Management System | Manage Veterinarians</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="./assets/css/theme.css" />
  <style>
    .sidebar-collapsed aside { width: 5.5rem; }
    .sidebar-collapsed .brand-copy, .sidebar-collapsed nav span, .sidebar-collapsed #userBadge { display: none; }
  </style>
</head>
<body class="bg-slate-100 text-slate-950 antialiased">
  <div id="appLayout" class="flex min-h-screen">
    <aside class="w-72 shrink-0 bg-slate-950 p-5 text-white transition-all duration-300">
      <div class="mb-8 flex items-center gap-3">
        <div class="flex h-11 w-11 items-center justify-center rounded-lg bg-teal-300 text-slate-950"><i data-lucide="stethoscope" class="h-6 w-6"></i></div>
        <div class="brand-copy"><p class="text-xs uppercase tracking-[0.28em] text-teal-200">Pet Care</p><h1 class="text-lg font-semibold">Management System</h1></div>
      </div>
      <nav id="sidebarNav" class="space-y-2"></nav>
      <div class="mt-8 rounded-lg border border-white/10 bg-white/10 p-4" id="userBadge"></div>
    </aside>
    <main class="flex-1 overflow-hidden">
      <header class="flex items-center justify-between border-b border-slate-200 bg-white px-6 py-4">
        <div class="flex items-center gap-3">
          <button id="sidebarToggle" class="rounded-lg border border-slate-200 p-2 transition-all duration-300 hover:bg-slate-100" aria-label="Toggle sidebar"><i data-lucide="panel-left-close" class="h-5 w-5"></i></button>
          <div><p class="text-sm font-semibold uppercase tracking-[0.22em] text-indigo-700">Admin Exclusive</p><h2 class="text-2xl font-semibold">Manage Veterinarians</h2></div>
        </div>
        <div class="flex items-center gap-3">
          <button id="openVetModal" class="flex items-center gap-2 rounded-lg bg-indigo-700 px-4 py-2 text-sm font-semibold text-white transition-all duration-300 hover:bg-slate-950"><i data-lucide="user-plus" class="h-4 w-4"></i> Register Vet</button>
          <button id="logoutBtn" class="rounded-lg bg-slate-950 px-4 py-2 text-sm font-semibold text-white transition-all duration-300 hover:bg-indigo-900">Logout</button>
        </div>
      </header>
      <section class="p-6">
        <div class="rounded-lg border border-slate-200 bg-white shadow-sm">
          <div class="border-b border-slate-200 px-5 py-4"><h3 class="text-lg font-semibold">Current Doctors</h3></div>
          <div class="overflow-x-auto">
            <table id="vets-table" class="w-full min-w-[860px] text-left text-sm">
              <thead class="bg-slate-50 text-xs uppercase tracking-[0.16em] text-slate-500">
                <tr><th class="px-4 py-3">Doctor</th><th class="px-4 py-3">Email</th><th class="px-4 py-3">Phone</th><th class="px-4 py-3">Address</th><th class="px-4 py-3">Status</th></tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
      </section>
    </main>
  </div>

  <aside id="vetModal" class="fixed right-0 top-0 z-40 h-full w-full max-w-md translate-x-full border-l border-slate-200 bg-white p-6 shadow-2xl transition-transform duration-300">
    <div class="mb-6 flex items-center justify-between">
      <div><p class="text-sm font-semibold uppercase tracking-[0.22em] text-indigo-700">Secure Admin Action</p><h3 class="text-2xl font-semibold">Register New Veterinarian</h3></div>
      <button id="closeVetModal" class="rounded-lg border border-slate-200 p-2 transition-all duration-300 hover:bg-slate-100" aria-label="Close"><i data-lucide="x" class="h-5 w-5"></i></button>
    </div>
    <form id="vetForm" class="space-y-4">
      <label class="block"><span class="mb-1 block text-sm font-semibold text-slate-600">Full Name</span><input name="full_name" required class="w-full rounded-lg border border-slate-200 px-4 py-3 outline-none focus:border-indigo-500" /></label>
      <label class="block"><span class="mb-1 block text-sm font-semibold text-slate-600">Username</span><input name="username" required class="w-full rounded-lg border border-slate-200 px-4 py-3 outline-none focus:border-indigo-500" /></label>
      <label class="block"><span class="mb-1 block text-sm font-semibold text-slate-600">Email</span><input name="email" type="email" required class="w-full rounded-lg border border-slate-200 px-4 py-3 outline-none focus:border-indigo-500" /></label>
      <label class="block"><span class="mb-1 block text-sm font-semibold text-slate-600">Phone</span><input name="phone_number" required class="w-full rounded-lg border border-slate-200 px-4 py-3 outline-none focus:border-indigo-500" /></label>
      <label class="block"><span class="mb-1 block text-sm font-semibold text-slate-600">Address</span><textarea name="address" required rows="3" class="w-full resize-none rounded-lg border border-slate-200 px-4 py-3 outline-none focus:border-indigo-500"></textarea></label>
      <label class="block"><span class="mb-1 block text-sm font-semibold text-slate-600">Password</span><input name="password" type="password" minlength="8" required class="w-full rounded-lg border border-slate-200 px-4 py-3 outline-none focus:border-indigo-500" /></label>
      <button type="submit" class="flex w-full items-center justify-center gap-2 rounded-lg bg-slate-950 px-5 py-3 font-bold text-white transition-all duration-300 hover:bg-indigo-800"><i data-lucide="shield-check" class="h-5 w-5"></i> Create Veterinarian</button>
    </form>
  </aside>
  <div id="notice" class="hidden"></div>

  <script type="module">
    import { initManageVets } from './assets/js/main.js';
    document.addEventListener('DOMContentLoaded', initManageVets);
  </script>
</body>
</html>
