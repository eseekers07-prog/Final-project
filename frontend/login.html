<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pet Care Management System | Secure Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="./assets/css/theme.css" />
  <style>
    .pet-bg {
      background-image: url('https://images.unsplash.com/photo-1630438994394-3deff7a591bf?auto=format&fit=crop&fm=jpg&q=85&w=2400');
      animation: bgDrift 18s ease-in-out infinite alternate;
    }
    .glass-card {
      animation: cardIn 780ms cubic-bezier(.2,.8,.2,1) both;
    }
    @keyframes bgDrift {
      from { transform: scale(1.02) translate3d(-8px, -4px, 0); }
      to { transform: scale(1.08) translate3d(10px, 8px, 0); }
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px) scale(.98); filter: blur(8px); }
      to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
    }
  </style>
</head>
<body class="min-h-screen bg-slate-950 text-white antialiased">
  <div class="pet-bg fixed inset-0 bg-cover bg-center"></div>
  <div class="fixed inset-0 bg-slate-950/68"></div>
  <header class="relative z-10 mx-auto flex max-w-6xl items-center justify-between px-5 py-5 text-sm font-semibold">
    <a href="index.html" class="flex items-center gap-2 text-teal-200"><i data-lucide="arrow-left" class="h-4 w-4"></i> Public Site</a>
    <a href="register.html" class="rounded-lg border border-white/25 px-4 py-2 text-white hover:bg-white/10">Create Owner Account</a>
  </header>
  <div class="relative flex min-h-screen items-center justify-center px-5 py-10">
    <section class="glass-card grid w-full max-w-5xl overflow-hidden rounded-[1.5rem] border border-white/20 bg-slate-950/42 shadow-2xl shadow-slate-950/50 backdrop-blur-lg md:grid-cols-[1.1fr_0.9fr]">
      <div class="hidden min-h-[560px] flex-col justify-between border-r border-white/10 bg-white/10 p-10 md:flex">
        <div class="flex items-center gap-3">
          <div class="flex h-11 w-11 items-center justify-center rounded-xl bg-teal-400 text-slate-950">
            <i data-lucide="stethoscope" class="h-6 w-6"></i>
          </div>
          <div>
            <p class="text-sm uppercase tracking-[0.28em] text-teal-200">Pet Care Management System</p>
            <h1 class="text-2xl font-semibold">Management System</h1>
          </div>
        </div>
        <div>
          <p class="max-w-md text-4xl font-semibold leading-tight">Secure access for appointments, records, products, and clinic operations.</p>
          <div class="mt-8 grid grid-cols-3 gap-3 text-sm text-slate-200">
            <div class="rounded-lg border border-white/15 bg-white/10 p-4">Appointments</div>
            <div class="rounded-lg border border-white/15 bg-white/10 p-4">Pet Records</div>
            <div class="rounded-lg border border-white/15 bg-white/10 p-4">Products</div>
          </div>
        </div>
      </div>

      <div class="p-7 sm:p-10">
        <div class="mb-8">
          <p class="text-sm font-semibold uppercase tracking-[0.28em] text-teal-200">Secure Access</p>
          <h2 class="mt-3 text-3xl font-semibold tracking-tight">Sign in to your workspace</h2>
        </div>

        <form id="loginForm" class="space-y-5">
          <label class="block">
            <span class="mb-2 block text-sm font-medium text-slate-200">Username</span>
            <span class="flex items-center gap-3 rounded-lg border border-white/15 bg-white/15 px-4 py-3 transition-all duration-300 focus-within:border-teal-300 focus-within:bg-white/20">
              <i data-lucide="user" class="h-5 w-5 text-teal-200"></i>
              <input name="username" required class="w-full bg-transparent text-white outline-none placeholder:text-slate-300" autocomplete="username" />
            </span>
          </label>

          <label class="block">
            <span class="mb-2 block text-sm font-medium text-slate-200">Password</span>
            <span class="flex items-center gap-3 rounded-lg border border-white/15 bg-white/15 px-4 py-3 transition-all duration-300 focus-within:border-teal-300 focus-within:bg-white/20">
              <i data-lucide="lock-keyhole" class="h-5 w-5 text-teal-200"></i>
              <input name="password" type="password" required class="w-full bg-transparent text-white outline-none placeholder:text-slate-300" autocomplete="current-password" />
            </span>
          </label>

          <button type="submit" class="flex w-full items-center justify-center gap-2 rounded-lg bg-white px-5 py-3 font-bold text-slate-950 shadow-xl shadow-slate-950/20 transition-all duration-300 hover:-translate-y-0.5 hover:bg-teal-200">
            <i data-lucide="log-in" class="h-5 w-5"></i>
            Sign In
          </button>
        </form>

        <div class="mt-7 flex flex-wrap items-center justify-between gap-3 text-sm text-slate-200">
          <span>New pet owner?</span>
          <a href="register.html" class="font-semibold text-teal-200 transition-all duration-300 hover:text-white">Create an owner account</a>
        </div>
      </div>
    </section>
  </div>
  <div id="notice" class="hidden"></div>

  <script type="module">
    import { handleLogin } from './assets/js/main.js';
    document.getElementById('loginForm').addEventListener('submit', handleLogin);
    window.lucide?.createIcons();
  </script>
</body>
</html>
